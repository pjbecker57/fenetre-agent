<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menuiseries Dupont — Votre conseiller fenêtres</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #DBEAFE;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --green-500: #10B981;
      --white: #FFFFFF;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER --- */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 10;
    }

    .header-logo {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .header-info p {
      font-size: 13px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--green-500);
      border-radius: 50%;
      display: inline-block;
    }

    /* --- CHAT AREA --- */
    .chat-container {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.assistant .message-avatar {
      background: var(--primary);
      color: white;
    }

    .message.user .message-avatar {
      background: var(--gray-300);
      color: var(--gray-700);
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.assistant .message-bubble {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 16px 16px 16px 4px;
      box-shadow: var(--shadow);
    }

    .message.user .message-bubble {
      background: var(--primary);
      color: white;
      border-radius: 16px 16px 4px 16px;
    }

    .message-bubble p { margin-bottom: 8px; }
    .message-bubble p:last-child { margin-bottom: 0; }
    .message-bubble ul, .message-bubble ol { margin: 8px 0; padding-left: 20px; }
    .message-bubble li { margin-bottom: 4px; }
    .message-bubble strong { font-weight: 600; }

    /* --- QUICK ACTIONS --- */
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 16px 12px;
    }

    .quick-btn {
      padding: 8px 16px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      font-size: 13px;
      color: var(--primary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    /* --- INPUT --- */
    .input-area {
      padding: 16px;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      max-width: 800px;
      margin: 0 auto;
    }

    .input-wrapper input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrapper input:focus {
      border-color: var(--primary);
    }

    .input-wrapper input::placeholder {
      color: var(--gray-300);
    }

    .send-btn {
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .send-btn:hover { background: var(--primary-dark); }
    .send-btn:disabled { background: var(--gray-300); cursor: not-allowed; }

    /* --- TYPING INDICATOR --- */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--gray-300);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); }
      40% { transform: scale(1); }
    }

    /* --- CTA BANNER --- */
    .cta-banner {
      display: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 12px 20px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .cta-banner.visible { display: block; }
    .cta-banner:hover { opacity: 0.95; }
    .cta-banner a { color: white; font-weight: 700; text-decoration: underline; }

    /* --- RESPONSIVE --- */
    @media (max-width: 640px) {
      .header { padding: 12px 16px; }
      .header-info h1 { font-size: 16px; }
      .message { max-width: 92%; }
      .quick-actions { padding: 0 12px 8px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🪟</div>
    <div class="header-info">
      <h1 id="company-name">Menuiseries Dupont</h1>
      <p><span class="status-dot"></span> Conseiller en ligne</p>
    </div>
  </div>

  <!-- CTA Banner (apparaît après quelques échanges) -->
  <div class="cta-banner" id="ctaBanner">
    📞 Envie d'un devis gratuit ? <a href="tel:0472000000">Appelez-nous au 04 72 00 00 00</a> ou <a href="#" onclick="sendQuickMessage('Je voudrais prendre rendez-vous pour une visite technique')">prenez RDV ici</a>
  </div>

  <!-- Chat -->
  <div class="chat-container">
    <div class="messages" id="messages"></div>

    <!-- Quick actions -->
    <div class="quick-actions" id="quickActions">
      <button class="quick-btn" onclick="sendQuickMessage('Je rénove ma maison et je dois changer mes fenêtres. Par où commencer ?')">🏠 Je rénove ma maison</button>
      <button class="quick-btn" onclick="sendQuickMessage('Quelle est la différence entre PVC et aluminium ?')">🔍 PVC vs Alu ?</button>
      <button class="quick-btn" onclick="sendQuickMessage('Quelles aides financières sont disponibles pour changer mes fenêtres ?')">💰 Aides financières</button>
      <button class="quick-btn" onclick="sendQuickMessage('Quels sont vos prix pour des fenêtres ?')">💶 Vos tarifs</button>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <input 
          type="text" 
          id="userInput" 
          placeholder="Posez votre question sur les fenêtres..." 
          autocomplete="off"
          onkeydown="if(event.key === 'Enter') sendMessage()"
        >
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          Envoyer ➤
        </button>
      </div>
    </div>
  </div>

  <script>
    // --- État ---
    let conversationId = null;
    let messageCount = 0;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const quickActions = document.getElementById('quickActions');
    const ctaBanner = document.getElementById('ctaBanner');

    // --- Message d'accueil ---
    window.addEventListener('DOMContentLoaded', () => {
      addMessage('assistant', 
        "Bonjour ! 👋 Je suis l'assistant virtuel de **Menuiseries Dupont**.\n\nJe peux vous aider à :\n- Choisir le bon type de fenêtres pour votre projet\n- Comprendre les différences entre matériaux et vitrages\n- Vous donner des fourchettes de prix indicatives\n- Vous informer sur les aides financières\n\nQuel est votre projet ?"
      );
    });

    // --- Envoi de message ---
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      quickActions.style.display = 'none';

      addMessage('user', text);
      const typingEl = showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            conversationId,
          }),
        });

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        conversationId = data.conversationId;
        removeTyping(typingEl);
        addMessage('assistant', data.reply);

        messageCount++;

        // Afficher le CTA après 3 échanges
        if (messageCount >= 3) {
          ctaBanner.classList.add('visible');
        }

        // Tracker les intents (pour le dashboard futur)
        if (data.intent && data.intent.length > 0) {
          console.log('📊 Intents détectés:', data.intent);
        }

      } catch (err) {
        removeTyping(typingEl);
        addMessage('assistant', "Désolé, j'ai un petit problème technique. Vous pouvez nous appeler directement au **04 72 00 00 00** 📞");
        console.error(err);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    function sendQuickMessage(text) {
      inputEl.value = text;
      sendMessage();
    }

    // --- Affichage des messages ---
    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const avatar = role === 'assistant' ? '🪟' : '👤';

      div.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="message-bubble">${formatMarkdown(content)}</div>
      `;

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.innerHTML = `
        <div class="message-avatar">🪟</div>
        <div class="message-bubble">
          <div class="typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      `;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function removeTyping(el) {
      if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    // --- Markdown simple ---
    function formatMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n- /g, '\n• ')
        .replace(/\n/g, '<br>')
        .replace(/• (.*?)(<br>|$)/g, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/<\/ul><ul>/g, '');
    }
  </script>
</body>
</html>
